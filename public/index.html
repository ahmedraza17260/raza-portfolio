  <!-- Inline Native Loader Core Layout Styles -->
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #0b0c10;
    }

    .loader-wrapper {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #0b0c10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      z-index: 99999;
    }

    .loader {
      display: inline-block;
      width: 40px;
      height: 40px;
      position: relative;
      border: 4px solid #ffffff;
      animation: loaderSpin 2.5s infinite ease;
      margin-bottom: 25px;
    }

    .loader-inner {
      vertical-align: top;
      display: inline-block;
      width: 100%;
      background-color: #66fcf1;
      animation: loaderFill 2.5s infinite ease-in;
    }

    .loader-text {
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.05rem;
      margin: 0;
      word-wrap: break-word;
    }

    @media screen and (max-width: 480px) {
      .loader {
        width: 32px;
        height: 32px;
        border-width: 3px;
      }
      .loader-text {
        font-size: 16px;
      }
    }

    @keyframes loaderSpin {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(180deg); }
      50% { transform: rotate(360deg); }
      75% { transform: rotate(540deg); }
      100% { transform: rotate(720deg); }
    }

    @keyframes loaderFill {
      0%, 25%, 100% { height: 0%; }
      50%, 75% { height: 100%; }
    }
  </style>
