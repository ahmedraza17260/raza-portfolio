[build]
  command = "next build"
  publish = ".next"

[build.environment]
  # Synchronized to match your active target engine profile perfectly
  NODE_VERSION = "22.22.3"
  # Ensures Next.js caching optimization runs flawlessly inside Netlify containers
  NEXT_DISABLE_SOURCEMAPS = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"